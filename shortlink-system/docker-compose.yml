services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: shortlink-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: shortlink
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - shortlink-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: shortlink-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - shortlink-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端API服务
  backend:
    build: ./backend
    container_name: shortlink-backend
    restart: always
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: shortlink
      REDIS_URL: redis://redis:6379
      JUMP_DOMAIN: ${JUMP_DOMAIN:-jump.yourdomain.com}
      SHORT_DOMAIN: ${SHORT_DOMAIN:-s.yourdomain.com}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shortlink-network

  # 前端Web界面
  frontend:
    build: ./frontend
    container_name: shortlink-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-18765}:80"
    depends_on:
      - backend
    networks:
      - shortlink-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  shortlink-network:
    driver: bridge
